<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Page</title>
    <!-- Tailwind & Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css -> add -->
    <link rel="stylesheet" href="./style.css">
    <style>
        .fonts {
            font-family: "Geist", sans-serif;
        }

        ;
    </style>
</head>

<body class="bg-[#F8FAFC]  justify-center items-center min-h-screen flex fonts">
    <div class="bg-white p-8 text-center rounded-md w-full max-w-md mx-auto shadow-md">
        <div>
            <div class="flex justify-center mb-6">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset mt-6">
            <label class="label font-medium text-[16px]">Username</label>
            <input id="input-userName" type="text" class="input w-full" placeholder="Enter Username" />

            <label class="label font-medium text-[16px] mt-4">Password</label>
            <input id="input-password" type="password" class="input w-full" placeholder="Password" />

            <button id="signIN-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </div>
    <script src="./script/login.js"></script>
</body>

</html>
